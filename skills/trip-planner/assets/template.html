const TA_SVG = '<svg width="14" height="14" viewBox="0 0 24 24" fill="#00aa6c"><circle cx="12" cy="12" r="10"/><path d="M12 6a6 6 0 100 12 6 6 0 000-12zm0 2a4 4 0 110 8 4 4 0 010-8z" fill="#fff"/></svg>';
const TYPE_NAME = { flight: 'Перелёт', hotel: 'Отель', transfer: 'Трансфер' };
const BADGE = { flight: 'badge-flight', hotel: 'badge-hotel', transfer: 'badge-transfer' };
function _nl(s) { return (s || '').replace(/\n/g, '<br>'); }
function _ok(s) { return _nl(s).replace(/включён/g, '<span class="ok">включён</span>'); }

function altsHtml(alts) {
  // Per-leg alternatives (KYZ-211): muted sub-lines under the chosen flight.
  if (!alts || !alts.length) return '';
  const lines = alts.map(a => {
    const bits = [a.time, a.price, a.note].filter(Boolean).join(' · ');
    return `<span class="alt">↳ <b>${a.operator || ''}</b>${bits ? ' ' + bits : ''}</span>`;
  }).join('');
  return `<div class="alts">${lines}</div>`;
}

function tableRowsHtml(T) {
  return T.rows.map((r, i) => {
    const dateCell = r.date + (r.dateNote ? `<br><span class="note">${r.dateNote}</span>` : '');
    const descCell = `<strong>${r.title}</strong>` + (r.sub ? `<br>${r.sub}` : '');
    const timeCell = _nl(r.time) + (r.timeNote ? `<br><span class="note">${_nl(r.timeNote)}</span>` : '');
    const detCell = (r.details || '') + (r.detailsNote ? `${r.details ? '<br>' : ''}<span class="note">${_ok(r.detailsNote)}</span>` : '') + altsHtml(r.alternatives);
    const ratingCell = r.rating
      ? `<a class="ta-rating" href="${r.rating.taUrl}" target="_blank">${TA_SVG}${r.rating.ta}</a><br><span class="ta-reviews">${r.rating.taReviews}</span><br><span class="note">Ostrovok: ${r.rating.ostrovok}</span>`
      : '&mdash;';
    const priceCell = r.price || '&mdash;';
    const priceAttr = r.priceNum != null ? ` data-rub="${r.priceNum}" data-orig="${priceCell}"` : '';
    const linksCell = (r.links || []).map(l => `<a class="link" href="${l.url}" target="_blank">${l.label}</a>`).join('<br>');
    const timeClass = r.type === 'hotel' ? '' : ' class="time-block"';
    return `<tr class="type-${r.type}"><td>${i + 1}</td><td><span class="badge ${BADGE[r.type]}">${TYPE_NAME[r.type]}</span></td><td>${dateCell}</td><td>${descCell}</td><td${timeClass}>${timeCell}</td><td>${detCell}</td><td>${ratingCell}</td><td class="price"${priceAttr}>${priceCell}</td><td>${linksCell}</td></tr>`;
  }).join('\n');
}

function summaryHtml(T) {
  return (T.summary || []).map(s => {
    const attr = s.rub != null ? ` data-rub="${s.rub}" data-orig="${s.value}"` : '';
    return `<div class="summary-item"><div class="summary-value"${attr}>${s.value}</div><div class="summary-label">${s.label}</div></div>`;
  }).join('');
}

function notesHtml(T) {
  return (T.notes || []).map(n => `<li>${n}</li>`).join('');
}

function variantsHtml(T) {
  // Whole-route variants (KYZ-212): stacked cards reusing the summary style.
  if (!T.variants || !T.variants.length) return '';
  const items = T.variants.map(v => {
    const sub = [v.nights != null ? `${v.nights} ноч.` : '', v.note || ''].filter(Boolean).join(' · ');
    return `<div class="summary-item"><div class="summary-value">${v.total || ''}</div><div class="summary-label"><strong>${v.label || ''}</strong>${sub ? '<br>' + sub : ''}</div></div>`;
  }).join('');
  return `<div class="card"><div class="card-header">Варианты маршрута</div><div class="summary-grid">${items}</div></div>`;
}

// Currency (KYZ-213): helpers render/convert only when meta.fx is present.
const CUR_SYMBOL = { RUB: '₽', EUR: '€', USD: '$', GBP: '£' };
function fxSymbol(c) { return CUR_SYMBOL[c] || c; }
function fmtMoney(n, cur) {
  const v = Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
  return `${v} ${fxSymbol(cur)}`;
}
function convertMoney(rub, rate, cur) { return fmtMoney(rub * rate, cur); }
function fxControlHtml(T) {
  const fx = (T.meta && T.meta.fx) || null;
  if (!fx || !Object.keys(fx).length) return '';
  const opts = ['RUB', ...Object.keys(fx)].map(c => `<option value="${c}">${c}</option>`).join('');
  return `<select class="cur-select" id="cur-select" title="Валюта">${opts}</select>`;
}

function xlsxAoa(T) {
  const head = ['#', 'Тип', 'Дата', 'Описание', 'Маршрут', 'Время', 'В пути', 'Оператор', 'Номер / Класс', 'Питание', 'Условия отмены', 'Багаж', 'Цена (2 чел.), ₽', 'TripAdvisor', 'Отзывов', 'Ostrovok', 'Ссылка бронирования', 'Ссылка TripAdvisor'];
  const plain = s => (s || '').replace(/&rarr;/g, '→').replace(/&times;/g, '×').replace(/&mdash;/g, '—').replace(/&ndash;/g, '–').replace(/&harr;/g, '↔').replace(/&#8381;/g, '₽').replace(/\n/g, ' ');
  const rows = T.rows.map((r, i) => {
    const x = r.x || {};
    const book = (r.links && r.links[0]) ? r.links[0].url : '';
    return [i + 1, TYPE_NAME[r.type], x.date || plain(r.date), plain(r.title), x.route || '', plain(r.time), x.duration || '—', x.operator || '—', x.klass || '—', x.meal || '—', x.cancel || '—', x.baggage || '—', (r.priceNum != null ? r.priceNum : ''), r.rating ? `${r.rating.ta}/5` : '', (r.rating && r.rating.taReviewsNum != null) ? r.rating.taReviewsNum : '', r.rating ? r.rating.ostrovok : '', book, r.rating ? r.rating.taUrl : ''];
  });
  const t = T.totals || {};
  const pad = (label, val) => ['', '', '', '', '', '', '', '', '', '', '', label, val, '', '', '', '', ''];
  return [head, ...rows, [], pad('ИТОГО перелёты:', t.flights), pad('ИТОГО отели:', t.hotels), pad('ИТОГО:', t.total)];
}

function pdfBodyHtml(T) {
  return T.rows.map(r => {
    const day = r.day ? `<div class="day">${r.day}</div>` : '';
    const rating = r.rating ? ` <span class="rating">TA ${r.rating.ta} · Ostrovok ${String(r.rating.ostrovok).replace('/10', '')}</span>` : '';
    const time = (r.type !== 'hotel' && (r.pdfTime || r.time)) ? `<div class="item-time">${r.pdfTime || _nl(r.time)}</div>` : '';
    const links = (r.links || []).map(l => `<a href="${l.url}">${l.label}</a>`).join('');
    const linksDiv = links ? `<div class="item-links">${links}</div>` : '';
    return `${day}<div class="item ${r.type}"><span class="tag tag-${r.type}">${TYPE_NAME[r.type]}</span>${rating}<div class="item-title">${r.pdfTitle || r.title}</div>${time}<div class="item-details">${_ok(r.pdfDetails || '')}</div>${linksDiv}</div>`;
  }).join('\n');
}
/* === end pure builders === */

@media print{body{padding:12px;max-width:100%}.item{break-inside:avoid}}`;

const TRIP = JSON.parse(document.getElementById('trip-data').textContent);

(function render() {
  document.title = TRIP.meta.title;
  document.getElementById('t-h1').textContent = TRIP.meta.h1 || TRIP.meta.destination || TRIP.meta.title;
  document.getElementById('t-sub').innerHTML = TRIP.meta.subtitle || '';
  document.getElementById('t-updated').textContent = TRIP.meta.updated || '';
  document.querySelector('#tripTable tbody').innerHTML = tableRowsHtml(TRIP);
  document.getElementById('t-summary').innerHTML = summaryHtml(TRIP);
  document.getElementById('t-notes').innerHTML = notesHtml(TRIP);
  document.getElementById('t-variants').innerHTML = variantsHtml(TRIP);
  const fxc = fxControlHtml(TRIP);
  if (fxc) {
    document.getElementById('t-currency').innerHTML = fxc;
    document.getElementById('cur-select').addEventListener('change', e => applyCurrency(e.target.value));
  }
})();

function applyCurrency(cur) {
  const fx = (TRIP.meta && TRIP.meta.fx) || {};
  const rate = cur === 'RUB' ? 1 : fx[cur];
  document.querySelectorAll('[data-rub]').forEach(el => {
    const rub = Number(el.getAttribute('data-rub'));
    el.textContent = (cur === 'RUB') ? el.getAttribute('data-orig') : convertMoney(rub, rate, cur);
  });
}

function downloadXLSX() {
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(xlsxAoa(TRIP));
  ws['!cols'] = [{wch:4},{wch:10},{wch:22},{wch:28},{wch:22},{wch:30},{wch:10},{wch:28},{wch:30},{wch:14},{wch:22},{wch:38},{wch:16},{wch:8},{wch:10},{wch:10},{wch:55},{wch:70}];
  XLSX.utils.book_append_sheet(wb, ws, 'Маршрут');
  XLSX.writeFile(wb, TRIP.meta.xlsxFile || 'trip.xlsx');
}

function downloadPDF() {
  const m = TRIP.meta;
  const notes = (m.pdfNotes || []).map(n => `<li>${n}</li>`).join('');
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>${m.pdfTitle || m.title}</title>
<style>${PDF_CSS}</style></head><body>
<h1>${m.pdfH1 || m.destination}</h1>
<p class="sub">${m.pdfSubtitle || ''}</p>
${pdfBodyHtml(TRIP)}
<ul class="notes">${notes}</ul>
<p class="footer">${m.updated || ''}</p>
<script>setTimeout(()=>window.print(),400)<\/script>
</body></html>`);
  w.document.close();
}
